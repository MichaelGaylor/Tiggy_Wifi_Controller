; WiFi CNC Controller - PlatformIO Configuration
;
; Board selection: change default_envs to your board:
;   esp32s3-zero           Waveshare ESP32-S3-Zero (3-axis, compact)
;   esp32s3-devkitc        ESP32-S3-DevKitC-1 octal (N16R8 / N8R8 class)
;   esp32s3-devkitc-quad   ESP32-S3-DevKitC-1 quad (N8 / N8R2 class)
;   esp32-wroom32          Classic ESP32-WROOM-32 (6-axis, limited I/O)
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor
; All:     pio run -t upload -t monitor

[platformio]
src_dir = main
;default_envs = esp32s3-zero
default_envs = esp32s3-devkitc
;default_envs = esp32s3-devkitc-quad
;default_envs = esp32-wroom32

[env]
platform = espressif32
framework = espidf
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

build_flags =
    -I../../protocol

[env:esp32s3-zero]
board = esp32-s3-devkitc-1

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32S3_ZERO

[env:esp32s3-devkitc]
board = esp32-s3-devkitc1-n16r8

board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults.devkitc_octal

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32S3_DEVKITC
    -DBOARD_ESP32S3_DEVKITC_OCTAL

[env:esp32s3-devkitc-quad]
board = esp32-s3-devkitc-1

board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = partitions.csv

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32S3_DEVKITC
    -DBOARD_ESP32S3_DEVKITC_QUAD

[env:esp32-wroom32]
board = esp32dev

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_WROOM32
