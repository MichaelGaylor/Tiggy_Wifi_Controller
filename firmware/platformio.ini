; WiFi CNC Controller - PlatformIO Configuration
;
; Board selection: change default_envs to your board:
;   esp32s3-zero     Waveshare ESP32-S3-Zero (3-axis, compact)
;   esp32s3-devkitc  ESP32-S3-DevKitC-1 N16R8 (6-axis, full I/O)
;   esp32-wroom32    Classic ESP32-WROOM-32 (6-axis, limited I/O)
;
; Build:   pio run
; Upload:  pio run -t upload
; Monitor: pio device monitor
; All:     pio run -t upload -t monitor

[platformio]
src_dir = main
;default_envs = esp32s3-zero      ; Waveshare Zero (3-axis)
default_envs = esp32s3-devkitc   ; DevKitC N16R8 (6-axis)
;default_envs = esp32-wroom32     ; Classic WROOM-32

; ============================================================
; Shared settings — pin platform version so local PIO and CI
; produce identical builds.  Without this, PIO may resolve to
; a different version causing boot crashes or build mismatches.
; v6.9.0 = ESP-IDF v5.3.1 (required for esp_driver_pcnt component)
; ============================================================
[common]
platform = espressif32@6.9.0

; ============================================================
; Shared configuration (all boards)
; ============================================================
[env]
platform = ${common.platform}
framework = espidf
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

board_build.cmake_extra_args =
    -DSDKCONFIG_DEFAULTS=sdkconfig.defaults

build_flags =
    -I../../protocol

; ============================================================
; Waveshare ESP32-S3-Zero
;   Chip: ESP32-S3FH4R2 (4MB Flash QIO, 2MB PSRAM QIO)
;   3-axis, compact form factor
;   Upload: USB-CDC (native USB port)
; ============================================================
[env:esp32s3-zero]
board = esp32-s3-devkitc-1

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

; USB-CDC upload (native USB, no UART bridge)
board_upload.use_1200bps_touch = false
board_upload.wait_for_upload_port = false

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32S3_ZERO

; ============================================================
; ESP32-S3-DevKitC-1 N16R8
;   Module: ESP32-S3-WROOM-1 (16MB Flash, 8MB PSRAM OPI)
;   6-axis, full I/O, charge pump
;   Upload: USB-UART bridge (CP2102 / CH340)
;   Dir A/B/C moved to GPIO 29/30/31 to avoid Octal PSRAM conflict
;   Misc In 3 moved to GPIO 32 (was 33)
; ============================================================
[env:esp32s3-devkitc]
board = esp32-s3-devkitc-1

board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = partitions.csv

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32S3_DEVKITC

; ============================================================
; Classic ESP32-WROOM-32 DevKit
;   4MB Flash QIO, no PSRAM
;   6-axis (limited GPIO), no charge pump
;   Upload: USB-UART bridge
; ============================================================
[env:esp32-wroom32]
board = esp32dev

board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = partitions.csv

build_flags =
    ${env.build_flags}
    -DBOARD_ESP32_WROOM32
