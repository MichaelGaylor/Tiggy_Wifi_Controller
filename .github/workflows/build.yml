name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-firmware:
    name: Build Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32s3-devkitc
            label: "Tiggy Pro board (DevKitC N16R8)"
          - board: esp32s3-zero
            label: "Tiggy Standard board (S3-Zero)"
    steps:
      - uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            firmware/.pio
          key: pio-${{ matrix.board }}-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: pio-${{ matrix.board }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio==6.1.19

      - name: Build firmware
        run: cd firmware && pio run -e ${{ matrix.board }}

      - name: Upload firmware binary
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: |
            firmware/.pio/build/${{ matrix.board }}/firmware.bin
            firmware/.pio/build/${{ matrix.board }}/bootloader.bin
            firmware/.pio/build/${{ matrix.board }}/partitions.bin

  build-linux:
    name: Package LinuxCNC installer
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Package LinuxCNC files
        run: |
          mkdir -p linuxcnc-package
          cp linuxcnc/wifi_cnc.c linuxcnc-package/
          cp linuxcnc/install.sh linuxcnc-package/
          cp linuxcnc/install.desktop linuxcnc-package/
          cp linuxcnc/build.sh linuxcnc-package/
          cp protocol/wifi_cnc_protocol.h linuxcnc-package/
          chmod +x linuxcnc-package/install.sh
          chmod +x linuxcnc-package/install.desktop

      - name: Upload LinuxCNC package
        uses: actions/upload-artifact@v4
        with:
          name: Tiggy-LinuxCNC
          path: linuxcnc-package/

  build-gui:
    name: Build Protocol Tester GUI (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build .exe
        run: |
          cd tools
          pyinstaller --onefile --noconsole --name TiggyProtocolTester protocol_test_gui.py
        shell: bash

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: TiggyProtocolTester
          path: tools/dist/TiggyProtocolTester.exe

  release:
    name: Create Release
    needs: [build-firmware, build-linux, build-gui]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Package releases
        run: |
          # LinuxCNC installer
          cd Tiggy-LinuxCNC && tar czf ../Tiggy-LinuxCNC.tar.gz . && cd ..

          # Firmware binaries
          for board in esp32s3-devkitc esp32s3-zero; do
            if [ -d "firmware-$board" ]; then
              cd "firmware-$board" && zip -r "../firmware-$board.zip" . && cd ..
            fi
          done

      - name: Get short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create or update latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.sha.outputs.short }})"
          body: |
            Automated build from commit ${{ github.sha }}

            ## ESP32 Firmware (flash via USB)
            - **firmware-esp32s3-devkitc.zip** - 6-axis DevKitC-1 N16R8
            - **firmware-esp32s3-zero.zip** - 3-axis Waveshare S3-Zero

            ## LinuxCNC
            - **Tiggy-LinuxCNC.tar.gz** - HAL component source + interactive installer

            ## Protocol Tester
            - **TiggyProtocolTester.exe** - Windows GUI for testing and configuring the controller

            ## Mach3 Plugin
            Download from [Tiggy Pro releases](https://github.com/MichaelGaylor/Tiggy_Wifi_Controller_Pro/releases/latest)
          files: |
            Tiggy-LinuxCNC.tar.gz
            firmware-esp32s3-devkitc.zip
            firmware-esp32s3-zero.zip
            TiggyProtocolTester/TiggyProtocolTester.exe
          prerelease: false
          make_latest: true
